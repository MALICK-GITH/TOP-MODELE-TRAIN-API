services:
  - type: web
    name: fifa-prediction-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
    # Force redeploy with updated models and history data - v2.7.0
